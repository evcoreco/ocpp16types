name: Weekly

on:
  schedule:
    - cron: "0 5 * * 0" # 05:00 UTC weekly (Sunday)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Race + Fuzz + Bench + Test-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Clean caches
        run: go clean -cache -testcache -modcache

      - name: Run full test-all
        run: make test-all

      - name: Run race detector (opt-in)
        run: make test-race

      - name: Run fuzzers (short)
        run: FUZZPROCS=4 make test-fuzz

      - name: Run benchmarks (smoke)
        run: make test-bench

      - name: Upload reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: weekly-artifacts-${{ github.run_number }}
          path: reports/**
          if-no-files-found: ignore
